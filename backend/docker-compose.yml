version: '3.8'

services:
  # PeerNet Application
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/peernet
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=your_access_secret_change_me
      - JWT_REFRESH_SECRET=your_refresh_secret_change_me
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  # MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
