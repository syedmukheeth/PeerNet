services:
  - type: web
    name: peernet-backend
    env: node
    rootDir: backend
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Secrets: set values manually in the Render dashboard ──
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false   # e.g. https://peernet.vercel.app
      - key: COOKIE_SECURE
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: AUTH_RATE_LIMIT_MAX
        value: "5"
      - key: LOG_LEVEL
        value: info
      - key: GEMINI_API_KEY
        sync: false
  - type: web
    name: peernet-chat
    env: node
    rootDir: backend
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CHAT_PORT
        value: 10000
      # ── Secrets: set values manually in the Render dashboard ──
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false   # e.g. https://peernet.vercel.app
      - key: GEMINI_API_KEY
        sync: false
